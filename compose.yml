services:
  api:
    image: mnemo:dev
    ports:
      - "8000:8000"
    volumes:
      - ./API:/app
    env_file:
      - path: ./API/.env
        required: false
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pipeline:
    build: ./pipeline
    profiles: ["pipeline"]
    environment:
      DATABASE_URL: postgresql+psycopg://mnemo:mnemo@db:5432/mnemo
      DATALAKE_DIR: /data/lake
    volumes:
      - mnemo_datalake:/data/lake
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mnemo
      POSTGRES_PASSWORD: mnemo
      POSTGRES_DB: mnemo
    ports:
      - "5432:5432"
    volumes:
      - mnemo_db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemo -d mnemo"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mnemo_db_data:
  mnemo_datalake:
