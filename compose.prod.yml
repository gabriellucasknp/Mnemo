services:
  api:
    build:
      context: ./API
      target: prod
    image: mnemo-api:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://mnemo:${POSTGRES_PASSWORD:-mnemo}@db:5432/mnemo
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?defina ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      DEBUG: "false"
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mnemo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mnemo}
      POSTGRES_DB: mnemo
    volumes:
      - mnemo_db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemo -d mnemo"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mnemo_db_data_prod:
