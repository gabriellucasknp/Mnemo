name: Deploy AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: API/requirements.txt
      - name: Instalar dependências
        working-directory: API
        run: |
          pip install --upgrade pip "setuptools<71" wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-build-isolation -r requirements.txt
      - name: Rodar testes
        working-directory: API
        run: python -m pytest tests -v --tb=short

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar na AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login no ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build da imagem (target prod)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE=$REGISTRY/mnemo-api
          docker build --target prod \
            -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./API
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Scan de vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Push pro ECR
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Baixar task definition atual
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_FAMILY }} \
            --query taskDefinition > task-definition.json

      - name: Renderizar task definition com a imagem do commit
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: api
          image: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Registrar e deployar no ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_SERVICE }}
          wait-for-service-stability: true
